# cueq — Local Development Services
# ====================================
# Start with:  docker-compose up -d
# Stop with:   docker-compose down
# Reset with:  docker-compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: cueq-postgres
    environment:
      POSTGRES_DB: cueq
      POSTGRES_USER: cueq
      POSTGRES_PASSWORD: cueq_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cueq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
