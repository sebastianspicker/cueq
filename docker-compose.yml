# cueq — Local Development Services
# ====================================
# Start with:  docker-compose up -d
# Stop with:   docker-compose down
# Reset with:  docker-compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: cueq-postgres
    environment:
      POSTGRES_DB: cueq
      POSTGRES_USER: cueq
      POSTGRES_PASSWORD: cueq_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cueq']
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cueq-keycloak
    command: ['start-dev', '--import-realm']
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - '8081:8080'
    volumes:
      - ./fixtures/keycloak/cueq-realm.json:/opt/keycloak/data/import/cueq-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
