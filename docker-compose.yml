# cueq — Local Development Services
# ====================================
# Start with:  docker-compose up -d
# Stop with:   docker-compose down
# Reset with:  docker-compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: cueq-postgres
    environment:
      POSTGRES_DB: cueq
      POSTGRES_USER: cueq
      POSTGRES_PASSWORD: cueq_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cueq']
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cueq-keycloak
    command: ['start-dev', '--import-realm']
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - '8081:8080'
    volumes:
      - ./fixtures/keycloak/cueq-realm.json:/opt/keycloak/data/import/cueq-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Monitoring stack (optional profile) ────────────────────────────────────
  # Start with:  docker-compose --profile monitoring up -d
  # Grafana UI:  http://localhost:3001  (admin/admin — change on first login)
  # Prometheus:  http://localhost:9090

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cueq-prometheus
    profiles: ['monitoring']
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cueq-alertmanager
    profiles: ['monitoring']
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:10.4.2
    container_name: cueq-grafana
    profiles: ['monitoring']
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3001:3000'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
