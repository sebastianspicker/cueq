name: Feature Request
description: Propose a new capability for cueq
labels: ['type:feature']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Which user or operational problem are we solving?
      placeholder: Describe the current gap and affected roles.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should be implemented?
      placeholder: Describe behavior, domain constraints, and API/UI impact.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List verifiable outcomes.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy-by-Design Checks
      options:
        - label: Personal data collection is minimized.
          required: true
        - label: Required roles/access scope are explicitly defined.
          required: true
        - label: Retention/deletion expectations are defined.
          required: true
