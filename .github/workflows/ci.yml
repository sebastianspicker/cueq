# cueq — Continuous Integration
# ================================
# Runs on every pull request and push to main.
# Validates: lint, typecheck, tests, Prisma schema.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  SKIP_DOCKER: 1
  DATABASE_URL: postgresql://cueq:cueq_ci_password@localhost:5432/cueq?schema=public

jobs:
  validate:
    name: Harness Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cueq
          POSTGRES_USER: cueq
          POSTGRES_PASSWORD: cueq_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cueq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=high || true

      - name: Setup
        run: make setup

      - name: Docs Link Check
        run: pnpm docs:links

      - name: Check
        run: make check

      - name: Acceptance
        run: make test-acceptance

      - name: Accessibility Gate (critical/serious)
        run: pnpm --filter @cueq/web test:acceptance --grep "a11y acceptance"

      - name: Build
        run: make build

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5b8a807627bf8 # v4.6.0
        with:
          fail-on-severity: high

  fresh-clone-smoke:
    name: Fresh Clone Smoke
    runs-on: ubuntu-latest
    needs: validate
    env:
      NODE_ENV: test
      SKIP_DOCKER: 1
      DATABASE_URL: postgresql://cueq:cueq_ci_password@localhost:5432/cueq?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cueq
          POSTGRES_USER: cueq
          POSTGRES_PASSWORD: cueq_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cueq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Fresh clone setup and check
        run: |
          make setup
          make check
