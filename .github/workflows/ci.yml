# cueq — Continuous Integration
# ================================
# Runs on every pull request and push to main.
# Validates: lint, typecheck, tests, Prisma schema.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://cueq:cueq_ci_password@localhost:5432/cueq?schema=public

jobs:
  validate:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cueq
          POSTGRES_USER: cueq
          POSTGRES_PASSWORD: cueq_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cueq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push schema to DB
        run: pnpm db:push

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Golden-case policy tests
        run: pnpm --filter @cueq/policy test:golden

      - name: Build
        run: pnpm build
